name: Presto — tweets après-midi (midi + soir)

# Génère les 2 tweets de l'après-midi À PARTIR du thread du matin déjà committé.
# Tourne à 15h UTC (11h EDT) : assez tard pour que le thread du matin existe,
# assez tôt pour précéder le post de midi (16h UTC) fait par le worker Cloudflare.
on:
  schedule:
    - cron: '0 15 * * *'    # 11h EDT (UTC-4)
  workflow_dispatch:         # bouton Run manuel (fallback)

permissions:
  contents: write

jobs:
  afternoon-tweets:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Générer les tweets midi + soir
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "DATE=$DATE" >> $GITHUB_ENV
          if [ ! -f "data/tweets/$DATE.json" ]; then
            echo "::warning::Pas de thread du matin pour $DATE. Skip après-midi."
            exit 0
          fi
          python tools/afternoon_tweets.py --date "$DATE"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_AFTERNOON: claude-haiku-4-5-20251001

      - name: Sauvegarder les tweets après-midi
        run: |
          git config user.name "Presto Bot"
          git config user.email "presto-bot@noreply"
          git add data/tweets/$DATE-midi.json data/tweets/$DATE-soir.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "tweets après-midi: $DATE [skip ci]"
          git pull --rebase origin main
          git push

      - name: Alerte si échec
        if: failure()
        run: |
          gh issue create \
            --title "⚠️ Tweets après-midi Presto échoués — $DATE" \
            --body "Le workflow afternoon a échoué. Voir : $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --label "incident" 2>/dev/null || echo "::error::Tweets après-midi échoués pour $DATE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
