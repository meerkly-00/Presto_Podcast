name: Presto — tweets du jour (génération)

# Déclenché AUTOMATIQUEMENT à la fin de briefing.yml, plus de cron timing fragile.
# Comme ça, dès que le script du jour est committé, la génération de tweets enchaîne.
on:
  workflow_run:
    workflows: ["Presto — briefing matinal"]
    types: [completed]
  workflow_dispatch:        # bouton Run manuel (fallback)

permissions:
  contents: write

jobs:
  generate-tweets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip si le briefing a échoué (sauf en manuel)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main      # toujours le HEAD le plus récent (le briefing vient de pousser)

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Générer le thread du jour
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "DATE=$DATE" >> $GITHUB_ENV
          if [ ! -f "output/scripts/$DATE.xml" ]; then
            echo "::warning::Pas de script pour $DATE (briefing pas encore publié). Skip."
            exit 0
          fi
          if [ -f "data/tweets/$DATE.json" ]; then
            echo "Thread déjà généré pour $DATE. Skip."
            exit 0
          fi
          python tools/tweet.py "output/scripts/$DATE.xml" --output-only "data/tweets/$DATE.json"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-haiku-4-5-20251001

      - name: Sauvegarder le thread
        run: |
          if [ -f "data/tweets/$DATE.json" ]; then
            git config user.name "Presto Bot"
            git config user.email "presto-bot@noreply"
            git add "data/tweets/$DATE.json"
            git diff --cached --quiet || git commit -m "tweets: $DATE [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Alerte si échec
        if: failure()
        run: |
          gh issue create \
            --title "⚠️ Génération tweets Presto échouée — $DATE" \
            --body "Le workflow tweet a échoué. Voir : $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --label "incident" 2>/dev/null || echo "::error::Génération tweets échouée pour $DATE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
