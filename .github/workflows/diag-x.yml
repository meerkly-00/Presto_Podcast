name: Diag — clés X (jetable)

# Workflow de diagnostic NON DESTRUCTIF : teste si les clés X authentifient
# (get_me) et si la recherche est permise (tier). Ne poste AUCUN tweet.
# À supprimer une fois le diagnostic terminé.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install tweepy
      - name: Tester les clés X
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          python - <<'PY'
          import os, tweepy

          print("=== TEST 0 : Format des cles (longueurs seulement, valeurs jamais affichees) ===")
          specs = {
              "TWITTER_API_KEY": (20, 30, "API Key / Cle Consommateur"),
              "TWITTER_API_SECRET": (40, 60, "API Secret"),
              "TWITTER_ACCESS_TOKEN": (45, 70, "Access Token (doit contenir un '-' et debuter par des chiffres)"),
              "TWITTER_ACCESS_TOKEN_SECRET": (40, 55, "Access Token Secret"),
          }
          for name, (lo, hi, desc) in specs.items():
              v = os.environ.get(name, "")
              s = v.strip()
              flags = []
              if not v:
                  flags.append("VIDE / ABSENT")
              if v != s:
                  flags.append("ESPACE OU RETOUR DE LIGNE AU BOUT")
              if s and not (lo <= len(s) <= hi):
                  flags.append(f"LONGUEUR INHABITUELLE (attendu ~{lo}-{hi})")
              if name == "TWITTER_ACCESS_TOKEN" and s and ("-" not in s or not s[:1].isdigit()):
                  flags.append("FORMAT SUSPECT (un Access Token ressemble a: chiffres-XXXX)")
              etat = "  <-- " + " ; ".join(flags) if flags else "  ok"
              print(f"{name}: longueur={len(s)} [{desc}]{etat}")

          client = tweepy.Client(
              consumer_key=os.environ["TWITTER_API_KEY"],
              consumer_secret=os.environ["TWITTER_API_SECRET"],
              access_token=os.environ["TWITTER_ACCESS_TOKEN"],
              access_token_secret=os.environ["TWITTER_ACCESS_TOKEN_SECRET"],
          )

          print("=== TEST 1 : Authentification (get_me) ===")
          auth_ok = False
          try:
              me = client.get_me()
              print(f"AUTH OK -- connecte comme @{me.data.username} (id={me.data.id})")
              auth_ok = True
          except Exception as e:
              print(f"AUTH ECHEC : {type(e).__name__}: {e}")

          print("=== TEST 2 : Recherche (search_recent_tweets -- exige tier Basic) ===")
          try:
              r = client.search_recent_tweets(query="quebec", max_results=10)
              n = len(r.data or [])
              print(f"SEARCH OK -- {n} tweets (tu as un tier payant)")
          except Exception as e:
              print(f"SEARCH bloque : {type(e).__name__}: {e}")

          print("=== CONCLUSION ===")
          if auth_ok:
              print("Les cles sont VALIDES. Le tweet quotidien (create_tweet) va fonctionner.")
          else:
              print("Les cles sont REJETEES. A regenerer dans le portail X "
                    "(Read+Write puis regenerer Access Token+Secret, MAJ des secrets GitHub).")
          PY
